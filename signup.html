<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Registrazione — Veterinari.it</title>
</head>
<body>

    <main class="login-card">
          <div class="logo-container">
    <img src="img/Logo-Veterinari-wp1-1-1024x190.webp" alt="Logo Veterinari.it" class="app-logo">
</div>
        
        <p class="subtitle">Benvenuti nella community PET più grande d’Italia.</p>

        <h2 class="section-title">REGISTRAZIONE</h2>

        <form id="signupForm" action="#" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="Inserisci la tua email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Minimo 8 caratteri">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Conferma password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" autocomplete="new-password" placeholder="Ripeti la password">
                <p id="passwordError" class="error-message">Le password non corrispondono.</p>
            </div>

            <button type="submit" id="submitButton">Registrati ora <i class="fa-solid fa-arrow-right" style="margin-left: 5px;"></i></button>
        </form>

        <p id="statusMessage" class="status-message" role="status" hidden></p>

        <p class="signup-link">Hai già un account? <a href="login.html">Accedi</a></p>
    </main>

    <script type="module" src="js/signup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Servizi e Prezzi — Veterinari.it</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/servizi-vet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container">
        <header class="page-header">
            <a href="javascript:history.back()" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h2>Servizi e Prezzi</h2>
                <p>Gestisci le tue tariffe</p>
            </div>
            <div style="width: 20px;"></div>
        </header>

        <div class="dashboard-content">
            
            <div id="emptyState" class="empty-state-card" style="display: none;">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <h3>Nessun servizio impostato</h3>
                <p>I proprietari non possono ancora prenotare appuntamenti con te. Aggiungi il tuo primo servizio per iniziare.</p>
                <button class="btn-primary open-modal-btn" style="margin-top: 15px; width: 100%;">
                    + Aggiungi servizio
                </button>
            </div>

            <div id="servicesContainer" style="display: none;">
                <div id="servicesList" class="services-list">
                    </div>
                
                <button class="btn-secondary open-modal-btn" style="margin-top: 20px; width: 100%;">
                    + Aggiungi un altro servizio
                </button>
            </div>

        </div>
    </main>

    <div id="addServiceModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuovo Servizio</h3>
                <button id="closeModalBtn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="addServiceForm">
                <div class="form-group">
                    <label>Nome del servizio</label>
                    <input type="text" id="srvName" placeholder="es. Visita generale, Vaccino..." required>
                </div>

                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Durata</label>
                        <select id="srvDuration" required>
                            <option value="15">15 min</option>
                            <option value="30" selected>30 min</option>
                            <option value="45">45 min</option>
                            <option value="60">60 min</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Prezzo (€)</label>
                        <input type="number" id="srvPrice" placeholder="es. 45" min="0" required>
                    </div>
                </div>

                <p id="statusMessage" class="status-message" hidden></p>
                <button type="submit" id="saveServiceBtn" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    Salva servizio
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="../../js/servizi-pro.js"></script>
</body>
</html>

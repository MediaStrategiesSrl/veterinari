<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Professionista — Veterinari.it</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/dashboard-pro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #F8F7F4; padding-bottom: 90px;">

    <main class="app-container">
        
        <header class="dash-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: transparent; border: none;">
            <img src="../../img/Logo-Veterinari-wp1-1-1024x190.webp" alt="Veterinari.it" class="dash-header-logo" style="max-height: 35px; width: auto; margin: 0;">
            
            <div class="header-icon" style="width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #1E293B; cursor: pointer;">
                <i class="fa-regular fa-bell" style="font-size: 1.2rem;"></i>
            </div>
        </header>

        <section class="hero-pro-card">
            <div class="hero-top-row">
                <div class="hero-pro-avatar">
                    <img id="profAvatar" src="https://ui-avatars.com/api/?name=Pro&background=E0F2FE&color=0284C7" alt="Avatar Professionista">
                </div>
                <div class="hero-pro-greeting">
                    <span class="badge-verified"><i class="fa-solid fa-check"></i> PROFILO VERIFICATO</span>
                    <h1 id="profGreeting">Buongiorno, <br>Caricamento...</h1>
                </div>
            </div>
            
            <div class="hero-bottom-row">
                <p id="profSubtitle">Calcolo appuntamenti in corso...</p>
                <button id="btnApriAgenda" class="btn-white">Apri agenda</button>
            </div>
        </section>

        <section class="section-container">
            <h2 class="section-title">Oggi</h2>
            <div id="todayAppointmentsContainer">
                <p style="color: #94A3B8; font-size: 0.9rem;">Caricamento agenda di oggi...</p>
                </div>
        </section>

        <section class="section-container">
            <h2 class="section-title">La tua attività</h2>
            <div class="activity-grid">
                
                <a href="agenda-pro.html" class="activity-card">
                    <div class="act-icon bg-orange"><i class="fa-solid fa-border-all"></i></div>
                    <h3>Agenda</h3>
                    <p>Disponibilità e luoghi</p>
                </a>

                <a href="clienti-pro.html" class="activity-card">
                    <div class="act-icon bg-light-blue"><i class="fa-solid fa-clover"></i></div>
                    <h3>Clienti</h3>
                    <p>Animali seguiti</p>
                </a>

                <a href="servizi-pro.html" class="activity-card">
                    <div class="act-icon bg-light-blue"><i class="fa-solid fa-bars"></i></div>
                    <h3>Servizi</h3>
                    <p>Listino prezzi</p>
                </a>

                <a href="incassi.html" class="activity-card">
                    <div class="act-icon bg-orange"><i class="fa-solid fa-euro-sign"></i></div>
                    <h3>Incassi</h3>
                    <p>Pagamenti ricevuti</p>
                </a>

            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard-professionista.html" class="nav-item active">
            <i class="fa-solid fa-house"></i><span>Home</span>
        </a>
        <a href="agenda-pro.html" class="nav-item">
            <i class="fa-solid fa-border-all"></i><span>Agenda</span>
        </a>
        <a href="clienti-pro.html" class="nav-item">
            <i class="fa-solid fa-clover"></i><span>Clienti</span>
        </a>
        <a href="servizi-pro.html" class="nav-item">
            <i class="fa-solid fa-bars"></i><span>Servizi</span>
        </a>
        <a href="profilo-pro.html" class="nav-item">
            <i class="fa-solid fa-user"></i><span>Profilo</span>
        </a>
    </nav>

    <script type="module" src="../../js/dashboard-professionista.js"></script>
</body>
</html>

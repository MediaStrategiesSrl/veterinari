<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profilo Animale — Veterinari.it</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/pets.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container" style="background-color: #F8F7F4;">

        <header class="header-nav" style="background: transparent;">
            <a href="dashboard-proprietario.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h2 id="pageHeaderTitle">Profilo di ...</h2>
                <p>Passaporto digitale</p>
            </div>
            <div class="header-icon"><i class="fa-solid fa-diamond"></i></div>
        </header>

        <div class="profile-header-center">
            <div class="profile-avatar-wrapper">
                <img id="petProfileAvatar" src="assets/default-pet.png" alt="Avatar Animale" onerror="this.src='https://ui-avatars.com/api/?name=P&background=E2E8F0&color=64748B'">
            </div>
            <h1 class="profile-name" id="petProfileName">...</h1>
            <p class="profile-id">ID animale <span id="petProfileId">...</span></p>
        </div>

        <div class="section-container">
            <div class="section-header-flex">
                <h3>Dati identificativi</h3>
                <a href="#" class="edit-link">Modifica</a>
            </div>

            <div class="info-card">
                <div class="info-icon icon-orange"><i class="fa-solid fa-paw"></i></div>
                <div class="info-text">
                    <div class="info-title">Specie e Razza</div>
                    <div class="info-desc" id="petSpeciesBreed">Caricamento...</div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon icon-blue"><i class="fa-solid fa-microchip"></i></div>
                <div class="info-text">
                    <div class="info-title">Microchip</div>
                    <div class="info-desc" id="petMicrochip">Non inserito</div>
                </div>
            </div>
        </div>

        <div class="section-container">
            <h3>Accessi autorizzati</h3>
            
            <div id="authorizedVetsContainer">
                <div class="empty-state-text">Caricamento veterinari...</div>
            </div>
        </div>

        <div class="section-container">
            <h3>Attività recente</h3>
            
            <div class="timeline" id="recentActivitiesContainer">
                <div class="empty-state-text">Caricamento attività...</div>
            </div>
        </div>

        <div style="height: 40px;"></div> 
    </main>

    <script type="module" src="../../js/profilo-animale.js"></script>
</body>
</html>

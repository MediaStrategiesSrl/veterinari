<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le mie attività — Mercatino Veterinari.it</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/mercatino.css">
    <link rel="stylesheet" href="../../css/le-mie-attivita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container attivita-main-container">

        <header class="attivita-header">
            <a href="mercatino.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title-wrapper">
                <h2>Le mie attività</h2>
                <p>Richieste e messaggi del Mercatino</p>
            </div>
            <div class="header-spacer"></div>
        </header>

        <!-- TAB -->
        <div id="tabSwitcher" class="tab-switcher">
            <button type="button" class="tab-btn active" data-tab="ricevute">Ricevute</button>
            <button type="button" class="tab-btn" data-tab="inviate">Inviate</button>
        </div>

        <div id="listaAttivita"></div>

    </main>

    <!-- MODALE DETTAGLIO / CHAT -->
    <!-- Nota: 'style="display:none;"' è lasciato inline per facilitare il toggle da JavaScript (es: element.style.display = 'flex') -->
    <div id="dettaglioModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="dettaglioTitolo"></h3>
                <span id="btnChiudiDettaglio" class="close-modal-btn">&times;</span>
            </div>
            <div id="dettaglioBody"></div>
        </div>
    </div>

    <script type="module" src="../../js/le-mie-attivita.js"></script>
</body>
</html>

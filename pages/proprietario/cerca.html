<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cerca — Veterinari.it</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body style="background-color: #F8F7F4;">

    <main class="app-container">

        <header class="header-nav" style="background: transparent;">
            <a href="dashboard-proprietario.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h2>Cerca</h2>
                <p>Professionisti e attività</p>
            </div>
            <div class="header-icon"><i class="fa-solid fa-diamond"></i></div>
        </header>

        <div class="search-section">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Veterinario" class="search-input">
            </div>
        </div>

        <div class="categories-scroll" id="categoriesContainer">
            <div class="category-pill">Caricamento...</div>
        </div>

        <div class="map-section">
            <div id="realMap" class="real-map-container"></div>
            <div class="location-badge" id="locationBadge">Localizzazione in corso...</div>
        </div>

        <div class="section-container" style="margin-top: 1.5rem;">
            <div class="section-header-flex">
                <h3 style="margin-bottom: 0;">Consigliati vicino a te</h3>
                <a href="#" class="edit-link" id="btnApriFiltri">Filtri</a>
            </div>

            <div id="professionalsList">
                <div style="text-align: center; padding: 2rem; color: #64748b;">Ricerca professionisti...</div>
            </div>
        </div>

        <div style="height: 100px;"></div>

        <nav class="bottom-nav">
            <a href="dashboard-proprietario.html" class="nav-item">
                <i class="fa-solid fa-house"></i><span>Home</span>
            </a>
            <a href="animali.html" class="nav-item">
                <i class="fa-solid fa-paw"></i><span>Animali</span>
            </a>
            <a href="cerca.html" class="nav-item active">
                <i class="fa-solid fa-magnifying-glass"></i><span>Cerca</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-euro-sign"></i><span>Wallet</span>
            </a>
            <a href="profilo.html" class="nav-item">
                <i class="fa-solid fa-user"></i><span>Profilo</span>
            </a>
        </nav>

    </main>

    <script type="module" src="../../js/cerca.js"></script>

    <div id="modalFiltri" class="modal-filtri">
    <div class="modal-filtri-content">
        <div class="modal-header">
            <h3>Filtri di ricerca</h3>
            <span id="closeFiltri" class="close-btn">&times;</span>
        </div>
        
        <div class="filter-group">
            <label for="distanceRange">Distanza massima: <span id="distanceValue" style="color: #F58220; font-size: 1.1rem;">5</span> km</label>
            <input type="range" id="distanceRange" min="1" max="50" value="5" step="1">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #94A3B8; margin-top: 5px;">
                <span>1 km</span>
                <span>50 km</span>
            </div>
        </div>
        
        <button id="applyFiltri" class="btn-primary" style="width: 100%; margin-top: 15px;">Applica filtro</button>
    </div>
</div>
</body>
</html>

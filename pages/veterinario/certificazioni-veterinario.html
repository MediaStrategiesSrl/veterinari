<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificazioni — Veterinari.it</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/certificazioni.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container">
        
        <header class="page-header">
            <a href="profilo-veterinario.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h2>Profilo e Certificazioni</h2>
                <p>Documenti e verifiche</p>
            </div>
            <div class="header-action" style="width: 20px;"></div> 
        </header>

        <div class="dashboard-content">
            
            <div class="info-alert">
                <i class="fa-solid fa-shield-halved"></i>
                <p>I tuoi dati e documenti sono archiviati in modo sicuro e utilizzati esclusivamente per la verifica dell'Ordine.</p>
            </div>

            <form id="certificationsForm">
                
                <h3 class="section-title">Dati Personali</h3>
                
                <div class="input-group" style="margin-bottom: 15px;">
                    <label style="display:block; font-size: 0.85rem; color: #64748B; margin-bottom: 6px; padding-left: 5px;">Nome e Cognome</label>
                    <input type="text" id="vetNomeCognome" class="custom-input" placeholder="Es. Marco Riva">
                </div>

                <div class="input-group" style="margin-bottom: 15px;">
                    <label style="display:block; font-size: 0.85rem; color: #64748B; margin-bottom: 6px; padding-left: 5px;">Email dell'Account</label>
                    <input type="email" id="vetEmail" class="custom-input" placeholder="nome@email.com">
                </div>

                <div class="input-group" style="margin-bottom: 30px;">
                    <label style="display:block; font-size: 0.85rem; color: #64748B; margin-bottom: 6px; padding-left: 5px;">Data di Nascita</label>
                    <input type="date" id="vetDataNascita" class="custom-input">
                </div>

                <h3 class="section-title">Foto Profilo</h3>
                <label for="avatarUpload" class="upload-card">
                    <div class="upload-icon icon-blue"><i class="fa-solid fa-camera"></i></div>
                    <div class="upload-text">
                        <h4 id="avatarFileName">Aggiorna foto</h4>
                        <p id="avatarSubtext">Formato JPG o PNG</p>
                    </div>
                    <div class="upload-btn"><i class="fa-solid fa-plus"></i></div>
                    <input type="file" id="avatarUpload" style="display: none;" accept="image/*">
                </label>

                <h3 class="section-title">Documento d'Identità</h3>
                <label for="ciUpload" class="upload-card">
                    <div class="upload-icon icon-orange"><i class="fa-regular fa-id-card"></i></div>
                    <div class="upload-text">
                        <h4 id="ciFileName">Carica documento</h4>
                        <p id="ciSubtext">Fronte/Retro in unico file PDF o Foto</p>
                    </div>
                    <div class="upload-btn"><i class="fa-solid fa-plus"></i></div>
                    <input type="file" id="ciUpload" style="display: none;" accept=".pdf,image/*">
                </label>

                <h3 class="section-title">Tessera dell'Ordine</h3>
                <label for="tesseraUpload" class="upload-card">
                    <div class="upload-icon icon-blue"><i class="fa-solid fa-address-card"></i></div>
                    <div class="upload-text">
                        <h4 id="tesseraFileName">Carica tessera</h4>
                        <p id="tesseraSubtext">PDF o Foto nitida</p>
                    </div>
                    <div class="upload-btn"><i class="fa-solid fa-plus"></i></div>
                    <input type="file" id="tesseraUpload" style="display: none;" accept=".pdf,image/*">
                </label>

                <h3 class="section-title">Numero di Iscrizione</h3>
                <div class="input-group">
                    <input type="text" id="vetNumeroOrdine" placeholder="Es. Ordine di Milano n. 5124" class="custom-input">
                </div>

                <div id="formMessage" style="margin-top: 15px; text-align: center; font-weight: 600; font-size: 0.9rem;"></div>

                <button type="submit" id="btnModificaSalva" class="btn-primary" style="margin-top: 25px; margin-bottom: 20px; background-color: transparent; color: #F58220; border: 2px solid #F58220;">
                    <i class="fa-solid fa-pen"></i> Modifica Profilo
                </button>
            </form>

            <!-- ZONA PERICOLOSA: ELIMINA RUOLO -->
            <div style="padding: 10px 0 40px 0;">
                <div id="deleteRoleBtn" style="background-color: #FEF2F2; border-radius: 12px; padding: 16px; text-align: center; color: #EF4444; font-weight: 700; cursor: pointer; border: 1px solid #FEE2E2; transition: all 0.2s;">
                    Elimina Ruolo Veterinario
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="../../js/certificazioni-veterinario.js"></script>
</body>
</html>

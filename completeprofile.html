<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Metadati di base e stile per la pagina di completamento profilo -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completa Profilo — Veterinari.it</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Pagina per completare il profilo utente dopo la registrazione -->
    <main class="signup-card">
        <h1>Completa Profilo</h1>
        <p class="subtitle">Scegli un profilo per esplorare la demo dell'app ed attivare il tuo account.</p>

        <form id="completeProfileForm" action="#" method="post">
            
            <!-- Contenitore delle Card Ruolo Dinamiche -->
            <div class="form-group">
                <label class="section-title">Chi sei?</label>
                <div id="role-cards-container" class="role-cards-grid"></div>
                <input type="hidden" id="roleSelect" name="role" required>
            </div>

            <!-- Questo blocco si mostra dopo aver cliccato su una Card -->
            <div id="dynamicFormFields" class="hidden">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Nome</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Cognome</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Telefono</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <!-- Campo Città (Comune a tutti) -->
                <div class="form-group">
                    <label for="city">Città</label>
                    <input type="text" id="city" name="city" required>
                </div>

                <!-- Campi specifici per ALTRO PROFESSIONISTA -->
                <div id="professionalFields" class="form-group hidden">
                    <label for="specificProfession">La tua Professione Specifica</label>
                    <select id="specificProfession" name="specificProfession">
                        <option value="" disabled selected>Seleziona la tua specializzazione...</option>
                        <option value="Pet Sitter">Pet Sitter</option>
                        <option value="Addestratore Cinofilo">Addestratore Cinofilo</option>
                        <option value="Toelettatore">Toelettatore</option>
                        <option value="Nutrizionista Animale">Nutrizionista Animale</option>
                        <option value="Altro">Altro / Freelance Pet</option>
                    </select>

                    <div id="specificProfessionOtherGroup" class="form-group hidden" style="margin-top: 15px;">
                        <label for="specificProfessionOther">Specifica il Tipo di Professionista</label>
                        <input type="text" id="specificProfessionOther" name="specificProfessionOther" placeholder="Es. Ostetrica Animale, Consulente Nutrizionale...">
                    </div>
                </div>

                <!-- Campi specifici per PROPRIETARIO -->
                <div id="clientFields" class="hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="petName">Nome Animale</label>
                            <input type="text" id="petName" name="petName">
                        </div>
                        <div class="form-group">
                            <label for="petSpecie">Tipo di Animale</label>
                            <select id="petSpecie" name="petSpecie">
                                <option value="" disabled selected>Scegli...</option>
                                <option value="Cane">Cane</option>
                                <option value="Gatto">Gatto</option>
                                <option value="Coniglio">Coniglio</option>
                                <option value="Uccello">Uccello</option>
                                <option value="Rettile">Rettile</option>
                                <option value="Altro">Altro (Specifica...)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Campo di testo nascosto che compare SOLO se selezioni "Altro" come Tipo di Animale -->
                    <div id="specificPetTypeGroup" class="form-group hidden" style="margin-top: 15px;">
                        <label for="petSpecieSpecific">Specifica il Tipo di Animale</label>
                        <input type="text" id="petSpecieSpecific" name="petSpecieSpecific" placeholder="Es. Criceto, Furetto, Cavallo...">
                    </div>
                </div>

                <!-- Campi specifici per VETERINARIO -->
                <div id="vetFields" class="hidden">
                    <div class="form-group">
                        <label for="vetOrderNumber">Numero Iscrizione Ordine</label>
                        <input type="text" id="vetOrderNumber" name="vetOrderNumber" placeholder="Es. Ordine di Milano n. 1842">
                    </div>
                    <div class="form-group">
                        <label for="vetClinicAddress">Indirizzo Clinica / Studio</label>
                        <input type="text" id="vetClinicAddress" name="vetClinicAddress" placeholder="Via Dante 18, Milano">
                    </div>
                </div>

                <!-- Campi specifici per SPONSOR -->
                <div id="sponsorFields" class="hidden">
                    <div class="form-group">
                        <label for="sponsorCompanyName">Nome Azienda / Brand</label>
                        <input type="text" id="sponsorCompanyName" name="sponsorCompanyName" placeholder="Es. PetCare Milano">
                    </div>
                    <div class="form-group">
                        <label for="sponsorVat">Partita IVA</label>
                        <input type="text" id="sponsorVat" name="sponsorVat" placeholder="11 cifre">
                    </div>
                </div>

                <button type="submit" id="submitButton">Salva e Continua</button>
            </div>
        </form>

        <p id="statusMessage" class="status-message" role="status" hidden></p>
    </main>

    <script type="module" src="js/completeprofile.js"></script>
</body>
</html>

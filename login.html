<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Login — Veterinari.it</title>
</head>
<body>

    <main class="login-card">
        <div class="logo-container">
    <img src="img/Logo-Veterinari-wp1-1-1024x190.webp" alt="Logo Veterinari.it" class="app-logo">
</div>
        
        <p class="subtitle">Bentornato! Accedi al tuo account per continuare.</p>

        <h2 class="section-title">LOGIN</h2>

        <form id="loginForm" action="#" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="Inserisci la tua email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" id="submitButton">Accedi <i class="fa-solid fa-arrow-right" style="margin-left: 5px;"></i></button>
        </form>

        <p id="statusMessage" class="status-message" role="status" hidden></p>

        <p class="signup-link">Non hai un account? <a href="signup.html">Registrati</a></p>
    </main>

    <script type="module" src="js/login.js"></script>
</body>
</html>

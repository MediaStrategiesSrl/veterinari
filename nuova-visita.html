<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuova Visita — Veterinari.it</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/nuova-visita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container">
        
        <header class="page-header">
            <a href="dashboard-veterinario.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h2>Nuova visita</h2>
                <p id="headerSubtitle">Caricamento...</p>
            </div>
            <div class="header-action">
                <i class="fa-solid fa-diamond"></i>
            </div>
        </header>

        <form id="medicalRecordForm" class="dashboard-content">
            
            <div class="form-group">
                <label>Paziente <span style="color:red">*</span></label>
                <select id="petSelect" required>
                    <option value="" disabled selected>Seleziona il paziente...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Motivo della visita</label>
                <input type="text" id="motivo" placeholder="Es: Controllo generale" required>
            </div>

            <div class="form-group">
                <label>Anamnesi e osservazioni</label>
                <textarea id="anamnesi" rows="4" placeholder="Inserisci i sintomi e le osservazioni..."></textarea>
            </div>

            <div class="form-group">
                <label>Diagnosi</label>
                <input type="text" id="diagnosi" placeholder="Es: Dermatite lieve">
            </div>

            <div class="form-group">
                <label>Terapia / Prescrizione</label>
                <textarea id="terapia" rows="3" placeholder="Es: Applicare spray topico 2 volte al giorno per 7 giorni."></textarea>
            </div>

     <label for="documentUpload" class="attachment-card" style="cursor: pointer; display: flex;">
                <div class="attach-info">
                    <i class="fa-solid fa-file-arrow-up"></i>
                    <div>
                        <h4 id="fileNameDisplay">Allega documenti</h4>
                        <p id="fileSubtext">Referti, esami, immagini (Max 5MB)</p>
                    </div>
                </div>
                <div class="attach-btn"><i class="fa-solid fa-plus"></i></div>
                <input type="file" id="documentUpload" style="display: none;" accept=".pdf,.jpg,.jpeg,.png">
            </label>

            <p class="disclaimer">
                La registrazione sarà firmata, datata e non eliminabile. Potrà essere rettificata mantenendo lo storico.
            </p>

            <button type="submit" id="submitBtn" class="btn-submit">Firma e salva nella cartella</button>
            <div id="formMessage" class="form-message"></div>
            
            <div style="height: 40px;"></div>
        </form>

    </main>

    <script type="module" src="js/nuova-visita.js"></script>
</body>
</html>

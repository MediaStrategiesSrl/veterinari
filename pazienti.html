<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I miei pazienti — Veterinari.it</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pazienti.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="app-container">
        
        <header class="page-header">
            <a href="dashboard-veterinario.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h2>I miei pazienti</h2>
                <p>Accessi attivi</p>
            </div>
            <div class="header-action">
                <i class="fa-solid fa-diamond"></i>
            </div>
        </header>

        <div class="dashboard-content">
            
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Nome o microchip">
            </div>

            <h3 class="section-title">Recenti</h3>
            
            <div id="patientsList" class="patients-list">
                <div style="text-align: center; padding: 20px; color: #64748B;">
                    <i class="fa-solid fa-spinner fa-spin"></i> Caricamento pazienti...
                </div>
            </div>

            <h3 class="section-title" style="margin-top: 30px;">Accessi</h3>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <p>ATTIVI</p>
                    <h2 id="activeCount">0</h2>
                </div>
                <div class="stat-card">
                    <p>REVOCATI</p>
                    <h2 id="revokedCount">0</h2>
                </div>
            </div>

            <div class="ad-banner">
                <strong>PETCARE+</strong> Protezione completa da €9,90/mese · <span>Scopri</span>
            </div>

        </div>

        <nav class="bottom-nav">
            <a href="dashboard-veterinario.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="agenda.html" class="nav-item">
                <i class="fa-solid fa-table-cells"></i>
                <span>Agenda</span>
            </a>
            <a href="scansiona.html" class="nav-item">
                <i class="fa-solid fa-square-full"></i>
                <span>Scansiona</span>
            </a>
            <a href="pazienti.html" class="nav-item active">
                <i class="fa-solid fa-paw"></i>
                <span>Pazienti</span>
            </a>
            <a href="profilo-veterinario.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profilo</span>
            </a>
        </nav>

    </main>

    <script type="module" src="js/pazienti.js"></script>
</body>
</html>
